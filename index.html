<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Aim Trainer 3D</title>
<link rel="stylesheet" href="style.css">
<style>
body { margin:0; overflow:hidden; background:black; cursor:none; }
canvas { display:block; }
</style>
</head>
<body>

<div id="menu" class="overlay">
  <h1>AIM TRAINER</h1>
  <button id="gridBtn">GRIDSHOT 3D</button>
  <button id="trackBtn">TRACKING 3D</button>
  <button id="bounceBtn">BOUNCE 3D</button>
</div>

<div id="hud" class="overlay hud" style="display:none;">
  <span id="time">⏱ 30</span>
  <span id="score">Score: 0</span>
  <span id="accuracy">Accuracy: 0%</span>
</div>

<div id="results" class="overlay" style="display:none;">
  <h1>RESULTS</h1>
  <p id="rScore"></p>
  <p id="rHits"></p>
  <p id="rShots"></p>
  <p id="rAcc"></p>
  <button id="backBtn">BACK TO MENU</button>
</div>

<canvas id="game"></canvas>

<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="game.js"></script>

</body>
</html>
