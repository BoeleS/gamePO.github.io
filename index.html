<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Aim Trainer 3D</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="menu" class="overlay">
  <h1>AIM TRAINER 3D</h1>
  <p>Kies een mode:</p>
  <button id="gridBtn">GRIDSHOT</button>
  <button id="bounceBtn">BOUNCE TRACKING</button>
  <button id="ballBtn">BALL TRACKING</button>
</div>

<div id="hud" class="overlay hud" style="display:none;">
  <span id="modeName">MODE</span>
  <span id="score">PTS 0</span>
  <span id="time">1:00</span>
  <span id="accuracy">100%</span>
</div>

<div id="results" class="overlay" style="display:none;">
  <h1>RESULTS</h1>
  <p id="rMode"></p>
  <p id="rScore"></p>
  <p id="rHits"></p>
  <p id="rShots"></p>
  <p id="rAcc"></p>
  <button id="backBtn">BACK TO MENU</button>
</div>

<canvas id="game"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="game.js"></script>

</body>
</html>
